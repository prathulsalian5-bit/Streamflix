<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - StreamFlix</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">▶ StreamFlix</div>
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="movies.html">Movies</a></li>
            <li><a href="tvshows.html">TV Shows</a></li>
            <li><a href="anime.html">Anime</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
        <div class="nav-auth">
            <a href="login.html" class="btn-login">Login</a>
            <a href="signup.html" class="btn-signup">Sign Up</a>
        </div>
    </nav>

    <!-- Signup Form -->
    <section class="auth-section">
        <div class="auth-box">
            <h1>Create Account</h1>
            <p>Join StreamFlix today</p>
            <form id="signupForm">
                <input type="text" id="fullname" placeholder="Full Name" required>
                <input type="email" id="signup-email" placeholder="Email" required>
                <input type="tel" id="phone" placeholder="Phone Number">
                <input type="password" id="signup-password" placeholder="Password" required>
                <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                <label><input type="checkbox" id="terms" required> I agree to Terms & Privacy</label>
                <button type="submit" class="btn-primary">Create Account</button>
                <p id="signupMessage"></p>
            </form>
            <p>Already have an account? <a href="login.html">Sign in here</a></p>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 StreamFlix | <a href="about.html">About</a> | <a href="#">Privacy</a> | <a href="#">Contact</a></p>
    </footer>

    <script src="player.js"></script>
</body>
</html>
